name: Publish Windows release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  publish:
    name: Build and publish NSIS installer
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Confirm tag matches the application version
        shell: pwsh
        run: |
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          if ($env:GITHUB_REF_NAME -ne "v$version") {
            throw "Tag '$env:GITHUB_REF_NAME' does not match application version '$version'."
          }

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend and NSIS installer
        run: pnpm exec tauri build --bundles nsis

      - name: Publish installer to GitHub Releases
        uses: softprops/action-gh-release@v3
        with:
          name: Live Downloader ${{ github.ref_name }}
          generate_release_notes: true
          files: src-tauri/target/release/bundle/nsis/*-setup.exe
          fail_on_unmatched_files: true
          overwrite_files: true
